name: deploy

on:
  push: { branches: [ main ] }
  workflow_dispatch:

permissions:
  contents: read

jobs:
  abyss-dev:
    runs-on: ubuntu-latest
    env:
      DART_SASS_VERSION: "1.99.0"
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          mkdir -p "${HOME}/.local"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Setup hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.0"
          extended: true

      - name: Hugo Build abyss.dev
        run: hugo --minify --environment abyss.dev

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_ABYSS_DEV }}
          external_repository: abyss/deployed-abyss.dev
          publish_dir: ./public
          user_name: abyss
          user_email: abyss@users.noreply.github.com
          publish_branch: main
          cname: abyss.dev

  cwr-io:
    runs-on: ubuntu-latest
    env:
      DART_SASS_VERSION: "1.99.0"
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          mkdir -p "${HOME}/.local"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Setup hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.0"
          extended: true

      - name: Hugo Build cwr.io
        run: hugo --minify --environment cwr.io

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_CWR_IO }}
          external_repository: abyss/deployed-cwr.io
          publish_dir: ./public
          user_name: abyss
          user_email: abyss@users.noreply.github.com
          publish_branch: main
          cname: cwr.io
