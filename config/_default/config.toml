baseURL         = 'https://abyss.dev/'
locale          = 'en-us'
title           = 'Craig Reeder'
copyright       = '&copy; <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
canonifyURLs    = false
enableRobotsTXT = true

[security.http]
  urls = ['https://cdn.jsdelivr.net/npm/simple-icons@latest/.*']

[outputs]
  home    = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[markup.highlight]
  noClasses = false
  lineNos   = false
  tabWidth  = 2

[markup.goldmark.renderer]
  unsafe = true

[params]
  defaultTheme  = "dark"
  canonicalBase = "https://abyss.dev"
  tagline       = "Cloud Engineering | Automation | DevOps"
  author        = "Craig Reeder"
  sourceURL     = "https://github.com/abyss/abyss.dev"
  description   = "Thoughts from a Cloud Engineer and DevOps Enthusiast"
  keywords      = "homepage, blog, devops, automation, system administration, cloud, aws, ansible, terraform, opentofu, portfolio"

  [[params.social]]
    icon = "linkedin"
    url  = "https://linkedin.com/in/craig-reeder"

  [[params.social]]
    icon = "github"
    url  = "https://github.com/abyss"

  [[params.social]]
    icon = "refinedgithub"
    url  = "https://github.com/creeder-uturn"

  [[params.social]]
    icon = "discord"
    url  = "https://discord.abyss.dev/"

[[menus.main]]
  name   = "posts"
  url    = "/posts/"
  weight = 1

[[menus.main]]
  name   = "talks"
  url    = "/talks/"
  weight = 2
