{{ with .Params.cover }}
<figure class="-mx-4 mb-8 mt-6">
  <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy" class="w-full">
  {{ with $.Params.coverCaption }}
  <figcaption class="text-center text-sm text-zinc-400 dark:text-zinc-600 mt-2 px-4">{{ . }}</figcaption>
  {{ end }}
</figure>
{{ end }}
