{{ with .Params.tags }}
<ul class="flex flex-wrap gap-2 list-none p-0 m-0" aria-label="Tags">
  {{ range . }}
  <li>
    <a href="{{ "/tags/" | relURL }}{{ . | urlize }}"
       class="text-xs font-mono text-zinc-500 dark:text-zinc-500 no-underline opacity-80 dark:opacity-60 hover:opacity-100 transition-opacity">
      #{{ . }}
    </a>
  </li>
  {{ end }}
</ul>
{{ end }}
