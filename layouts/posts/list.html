{{ define "main" }}
<section>
  {{ range .RegularPages.GroupByDate "2006" }}
  <div class="mb-10">
    <span class="block mb-3 text-sm font-mono text-zinc-500 dark:text-zinc-600">{{ .Key }}</span>
    <ul class="space-y-3 list-none p-0">
      {{ range .Pages }}
      <li class="flex items-baseline justify-between gap-4">
        <a href="{{ .RelPermalink }}"
           class="text-zinc-700 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white transition-colors no-underline text-lg">
          {{ .Title }}
        </a>
        <time datetime="{{ .Date.Format "2006-01-02" }}"
              class="shrink-0 text-sm font-mono text-zinc-400 dark:text-zinc-600">
          {{ .Date.Format "Jan 02" }}
        </time>
      </li>
      {{ end }}
    </ul>
  </div>
  {{ end }}
</section>
{{ end }}
